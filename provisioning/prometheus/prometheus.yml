global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']
    relabel_configs:
      - target_label: instance
        replacement: 'hostoverview.local:9090'

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - target_label: instance
        replacement: 'hostoverview.local:9100'

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
    relabel_configs:
      - target_label: instance
        replacement: 'hostoverview.local:8080'
